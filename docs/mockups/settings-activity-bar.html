<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>设置页活动栏改造 — 视觉稿 v6</title>
<script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/antd@5/dist/antd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ant-design/icons@5/dist/index.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --color-primary:#2F5D50;--color-primary-hover:#1e4438;
    --color-primary-bg:rgba(47,93,80,0.05);--color-primary-bg-hover:rgba(47,93,80,0.10);--color-primary-border:rgba(47,93,80,0.20);
    --color-success:#2E8B57;--color-success-bg:rgba(46,139,87,0.1);--color-warning:#964400;--color-warning-bg:rgba(150,68,0,0.1);
    --color-error:#ba1a1a;--color-error-bg:rgba(186,26,26,0.06);
    --bg-page:#f0ece4;--bg-elevated:#faf8f4;--bg-muted:#f5f2ec;--bg-strong:#e8e4dc;
    --text-primary:#1a1814;--text-secondary:#4a4640;--text-tertiary:#807b74;--text-light:#b5b0a8;
    --border:#ddd8d0;--border-strong:#c0bbb3;--border-light:#ebe7e0;
    --accent:var(--color-primary);--accent-soft:var(--color-primary-bg);
    --panel:var(--bg-elevated);--panel-soft:var(--bg-muted);--panel-strong:var(--bg-strong);
    --text:var(--text-primary);--muted:var(--text-secondary);--ink-tertiary:var(--text-tertiary);--line:var(--border);
    --shadow:0 1px 3px rgba(24,28,34,0.08);--shadow-md:0 4px 12px rgba(24,28,34,0.12);
    --font-display:'Noto Serif SC',serif;--font-body:'Noto Sans SC',-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:var(--font-body);background:var(--bg-page);color:var(--text);font-size:14px;height:100vh;overflow:hidden;}
  .ant-btn-primary{background:var(--color-primary)!important;border-color:var(--color-primary)!important;}
  .ant-btn-primary:hover{background:var(--color-primary-hover)!important;border-color:var(--color-primary-hover)!important;}
  .ant-slider-track{background:var(--color-primary)!important;}
  .ant-slider-handle::after{box-shadow:0 0 0 2px var(--color-primary)!important;}
  .page{display:flex;height:100vh;overflow:hidden;}
  .ab{width:56px;min-width:56px;background:linear-gradient(180deg,#e8e4dc 0%,#e0dbd3 100%);border-right:1px solid var(--border-strong);display:flex;flex-direction:column;padding:16px 0;gap:6px;align-items:center;}
  .abBtn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;border-radius:var(--radius-md);cursor:pointer;color:var(--ink-tertiary);font-size:18px;transition:all 0.2s ease;position:relative;}
  .abBtn:hover{background:rgba(47,93,80,0.08);color:var(--text-secondary);}
  .abBtn.on{background:var(--panel);color:var(--accent);box-shadow:var(--shadow);border:1px solid var(--border-light);}
  .abBtn.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:0 3px 3px 0;}
  .abBtn .tp{display:none;position:absolute;left:56px;top:50%;transform:translateY(-50%);background:var(--text);color:var(--panel);padding:5px 10px;border-radius:var(--radius-sm);font-size:12px;white-space:nowrap;z-index:100;box-shadow:var(--shadow-md);}
  .abBtn:hover .tp{display:block;}
  .abSp{flex:1;}.abDv{width:20px;height:1px;background:var(--border-strong);margin:6px 0;}
  .cfgList{width:232px;min-width:232px;background:var(--panel);border-right:1px solid var(--border-light);display:flex;flex-direction:column;overflow:hidden;}
  .cfgListHd{padding:14px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
  .cfgListTitle{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--text);}
  .cfgListBody{flex:1;overflow-y:auto;padding:8px 0;}
  .cfgItem{padding:12px 16px;cursor:pointer;border-left:2px solid transparent;transition:all 0.12s;margin:0 8px;border-radius:var(--radius-sm);}
  .cfgItem:hover{background:rgba(47,93,80,0.04);}
  .cfgItem.on{background:var(--accent-soft);border-left-color:var(--accent);}
  .cfgItemName{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:6px;}
  .cfgItemMeta{font-size:11px;color:var(--ink-tertiary);display:flex;flex-direction:column;gap:2px;}
  .cfgItemKey{font-family:monospace;font-size:11px;color:var(--text-tertiary);letter-spacing:0.5px;}
  .cfgItemBadge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;}
  .badgeOk{color:var(--color-success);background:var(--color-success-bg);}
  .badgeNone{color:var(--ink-tertiary);background:var(--bg-muted);border:1px solid var(--border-light);}
  .ct{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;background:var(--bg-page);}
  .hdr{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--border-light);background:var(--panel);flex-shrink:0;}
  .hdrLeft{display:flex;align-items:center;gap:10px;}
  .hdrTitle{font-family:var(--font-display);font-size:15px;font-weight:700;}
  .hdrSep{width:1px;height:18px;background:var(--border);}
  .hdrRight{display:flex;align-items:center;gap:8px;}
  .detail{flex:1;overflow-y:auto;padding:24px 28px;}
  .detailSection{font-size:13px;font-weight:600;color:var(--text);margin:20px 0 12px;display:flex;align-items:center;gap:8px;}
  .detailSection:first-child{margin-top:0;}
  .secIcon{color:var(--accent);font-size:14px;}
  .kvGrid{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--border-light);border-radius:var(--radius-lg);overflow:hidden;background:var(--panel);}
  .kvCell{padding:14px 18px;border-bottom:1px solid var(--border-light);border-right:1px solid var(--border-light);}
  .kvCell:nth-child(2n){border-right:none;}
  .kvCell.full{grid-column:1/-1;border-right:none;}
  .kvLabel{font-size:11px;color:var(--ink-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
  .kvValue{font-size:14px;color:var(--text);font-weight:500;line-height:1.4;}
  .kvValue.mono{font-family:monospace;font-size:13px;}
  .maskedKey{display:inline-flex;align-items:center;gap:6px;}
  .keyText{font-family:monospace;font-size:13px;color:var(--text-tertiary);letter-spacing:0.5px;}
  .toggle{cursor:pointer;color:var(--ink-tertiary);font-size:14px;}
  .toggle:hover{color:var(--accent);}
  .emptyState{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink-tertiary);gap:8px;}
  .emptyIcon{font-size:40px;opacity:0.3;}
</style>
</head>
<body>
<div id="root"></div>
<script>
var C=React.createElement;
var icons=window.icons;
var SettingOutlined=icons.SettingOutlined,FileTextOutlined=icons.FileTextOutlined,ArrowLeftOutlined=icons.ArrowLeftOutlined;
var PlusOutlined=icons.PlusOutlined,EditOutlined=icons.EditOutlined,DeleteOutlined=icons.DeleteOutlined;
var SaveOutlined=icons.SaveOutlined,CheckCircleOutlined=icons.CheckCircleOutlined,CloseCircleOutlined=icons.CloseCircleOutlined;
var EyeOutlined=icons.EyeOutlined,EyeInvisibleOutlined=icons.EyeInvisibleOutlined;
var ApiOutlined=icons.ApiOutlined,CloudOutlined=icons.CloudOutlined,LoadingOutlined=icons.LoadingOutlined;
var SyncOutlined=icons.SyncOutlined;
var Select=antd.Select,Input=antd.Input,InputNumber=antd.InputNumber,Button=antd.Button,Slider=antd.Slider,Modal=antd.Modal,Alert=antd.Alert,Tag=antd.Tag,Divider=antd.Divider;

var CONFIGS=[
  {id:1,name:'OpenAI GPT-4o',provider:'openai',fmt:'openai',baseUrl:'https://api.openai.com/v1',apiKey:'sk-proj-abc123def456ghi789jkl012mno345pqr678stu901vwx234',model:'gpt-4o',ctx:128000,temp:0.7,status:'connected'},
  {id:2,name:'Anthropic Claude',provider:'anthropic',fmt:'anthropic',baseUrl:'https://api.anthropic.com',apiKey:'sk-ant-api03-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx',model:'claude-sonnet-4-20250514',ctx:200000,temp:0.7,status:'idle'}
];

var PROVIDERS={openai:{fmt:'openai',baseUrl:'https://api.openai.com/v1',models:['gpt-4o','gpt-4o-mini','gpt-4-turbo'],ctx:128000,temp:[0,2]},anthropic:{fmt:'anthropic',baseUrl:'https://api.anthropic.com',models:['claude-sonnet-4-20250514','claude-3-5-haiku-20241022'],ctx:200000,temp:[0,1]},deepseek:{fmt:'openai',baseUrl:'https://api.deepseek.com',models:['deepseek-chat','deepseek-coder'],ctx:64000,temp:[0,2]},custom:{fmt:'custom',baseUrl:'',models:[],ctx:128000,temp:[0,2]}};
var pLabel=function(p){return p==='openai'?'OpenAI':p==='anthropic'?'Anthropic':p==='deepseek'?'DeepSeek':p;};
var fLabel=function(f){return f==='openai'?'OpenAI Compatible':f==='anthropic'?'Anthropic':'自定义';};

function App(){
  var s1=React.useState('ai-config');var active=s1[0],setActive=s1[1];
  var s2=React.useState(1);var selId=s2[0],setSelId=s2[1];
  var s3=React.useState(false);var showKey=s3[0],setShowKey=s3[1];
  var s4=React.useState(false);var modalOpen=s4[0],setModalOpen=s4[1];
  var s5=React.useState('');var modalMode=s5[0],setModalMode=s5[1];
  var s6=React.useState('idle');var testSt=s6[0],setTestSt=s6[1];
  var s7=React.useState('');var testMsg=s7[0],setTestMsg=s7[1];

  var sel=CONFIGS.find(function(c){return c.id===selId;});
  var masked=sel?sel.apiKey.substring(0,7)+'****'+sel.apiKey.substring(sel.apiKey.length-4):'';

  var autoTest=function(){setTestSt('testing');setTestMsg('');setTimeout(function(){setTestSt('success');setTestMsg('连接成功，模型 '+sel.model+' 可用');},1500);};

  // Activity Bar
  var ab=C('div',{className:'ab'},
    C('button',{className:'abBtn'+(active==='ai-config'?' on':''),onClick:function(){setActive('ai-config');}},C(SettingOutlined),C('span',{className:'tp'},'AI 配置')),
    C('button',{className:'abBtn'+(active==='prompt-lib'?' on':''),onClick:function(){setActive('prompt-lib');}},C(FileTextOutlined),C('span',{className:'tp'},'提示词库')),
    C('div',{className:'abSp'}),C('div',{className:'abDv'}),
    C('button',{className:'abBtn',onClick:function(){alert('返回上一页');}},C(ArrowLeftOutlined),C('span',{className:'tp'},'返回'))
  );

  // Config List
  var cfgList=C('div',{className:'cfgList'},
    C('div',{className:'cfgListHd'},C('span',{className:'cfgListTitle'},'AI 配置'),
      C(Button,{type:'text',size:'small',icon:C(PlusOutlined),onClick:function(){setModalMode('create');setModalOpen(true);setTestSt('idle');setTestMsg('');},style:{color:'var(--accent)'}})),
    C('div',{className:'cfgListBody'},CONFIGS.map(function(c){
      return C('div',{key:c.id,className:'cfgItem'+(selId===c.id?' on':''),onClick:function(){setSelId(c.id);setShowKey(false);setTestSt('idle');setTestMsg('');}},
        C('div',{className:'cfgItemName'},c.name,c.status==='connected'?C('span',{className:'cfgItemBadge badgeOk'},'已连接'):C('span',{className:'cfgItemBadge badgeNone'},'未测试')),
        C('div',{className:'cfgItemMeta'},pLabel(c.provider)+' · '+c.model,C('span',{className:'cfgItemKey'},c.apiKey.substring(0,7)+'****')));
    }))
  );

  // Header
  var header=C('div',{className:'hdr'},
    C('div',{className:'hdrLeft'},
      C('span',{className:'hdrTitle'},sel?sel.name:'选择配置'),
      sel?C('div',{className:'hdrSep'}):null,
      sel?C(Tag,{color:sel.status==='connected'?'success':'default',style:{margin:0}},sel.status==='connected'?'已连接':'未测试'):null),
    C('div',{className:'hdrRight'},
      sel?C(Button,{size:'small',icon:C(EditOutlined),onClick:function(){setModalMode('edit');setModalOpen(true);setTestSt('idle');setTestMsg('');}},'编辑'):null,
      sel?C(Button,{size:'small',icon:C(DeleteOutlined),danger:true,onClick:function(){Modal.confirm({title:'删除配置',content:'确定要删除「'+sel.name+'」吗？',okText:'删除',okType:'danger',cancelText:'取消',onOk:function(){alert('已删除 '+sel.name);}});}},'删除'):null)
  );

  // Detail
  var kv=function(label,value,extra){
    return C('div',{className:'kvCell'+(extra==='full'?' full':'')},
      C('div',{className:'kvLabel'},label),C('div',{className:'kvValue'},value));
  };
  var detail=sel?C('div',{className:'detail'},
    C('div',{className:'detailSection'},C(ApiOutlined,{className:'secIcon'}),'连接信息'),
    C('div',{className:'kvGrid'},
      kv('厂商',pLabel(sel.provider)),
      kv('API 格式',fLabel(sel.fmt)),
      kv('Base URL',sel.baseUrl,'full'),
      kv('API Key',C('span',{className:'maskedKey'},C('span',{className:'keyText'},showKey?sel.apiKey:masked),C('span',{className:'toggle',onClick:function(){setShowKey(!showKey);}},showKey?C(EyeInvisibleOutlined):C(EyeOutlined))),'full'),
      kv('模型',sel.model),
      kv('状态',sel.status==='connected'?C(Tag,{color:'success'},C(CheckCircleOutlined),' 已连接'):C(Tag,null,'未测试')),
      kv('上下文大小',sel.ctx>=1000?(sel.ctx/1000)+'K':sel.ctx+' tokens'),
      kv('温度',String(sel.temp))
    ),
    testSt==='success'?C(Alert,{type:'success',showIcon:true,message:'连接测试通过',description:testMsg,style:{marginTop:16},closable:false}):
    testSt==='error'?C(Alert,{type:'error',showIcon:true,message:'连接测试失败',description:testMsg,style:{marginTop:16},closable:false}):
    testSt==='testing'?C(Alert,{type:'info',showIcon:true,message:C('span',null,C(LoadingOutlined),' 正在测试连接...'),description:'正在验证 API Key 和模型可用性',style:{marginTop:16},closable:false}):null,
    C(Divider),
    C(Button,{type:'primary',icon:C(CloudOutlined),onClick:autoTest,loading:testSt==='testing'},'测试连接'),
    C('span',{style:{marginLeft:8,fontSize:12,color:'var(--ink-tertiary)'}},'验证 API Key 和模型是否可用')
  ):C('div',{className:'emptyState'},C('div',{className:'emptyIcon'},C(ApiOutlined)),C('div',{style:{fontSize:13}},'选择一个配置查看详情'));

  // Modal Form
  var formRow=function(label,input,required){
    return C('div',{style:{marginBottom:16}},
      C('div',{style:{fontSize:13,fontWeight:500,color:'var(--text-secondary)',marginBottom:6}},label,required?C('span',{style:{color:'var(--color-error)',marginLeft:2}},'*'):null),
      input);
  };
  var modalFooter=C('div',{style:{display:'flex','justify-content':'space-between',alignItems:'center'}},
    C(Button,{onClick:function(){setModalOpen(false);}},'取消'),
    C('div',{style:{display:'flex',gap:8,alignItems:'center'}},
      testSt==='success'?C(Tag,{color:'success',style:{margin:0}},C(CheckCircleOutlined),' 已验证'):null,
      testSt==='error'?C(Tag,{color:'error',style:{margin:0}},C(CloseCircleOutlined),' 验证失败'):null,
      C(Button,{onClick:autoTest,loading:testSt==='testing'},'测试连接'),
      C(Button,{type:'primary',icon:C(SaveOutlined)},modalMode==='create'?'创建并保存':'保存'))
  );
  var modalBody=C('div',{style:{padding:'4px 0'}},
    formRow('配置名称',C(Input,{placeholder:'例如：OpenAI GPT-4o',defaultValue:modalMode==='edit'&&sel?sel.name:''})),
    formRow('厂商选择',C(Select,{style:{width:'100%'},placeholder:'选择服务商后自动填充基础参数',defaultValue:modalMode==='edit'&&sel?sel.provider:undefined,options:[{value:'openai',label:'OpenAI'},{value:'anthropic',label:'Anthropic'},{value:'deepseek',label:'DeepSeek'},{value:'custom',label:'自定义'}]})),
    formRow('API 格式',C(Select,{style:{width:'100%'},defaultValue:modalMode==='edit'&&sel?sel.fmt:'openai',options:[{value:'openai',label:'OpenAI Compatible'},{value:'anthropic',label:'Anthropic'},{value:'custom',label:'自定义'}]})),
    formRow('Base URL',C(Input,{placeholder:'选择厂商后自动填充',defaultValue:modalMode==='edit'&&sel?sel.baseUrl:''}),true),
    formRow('API Key',C(Input.Password,{placeholder:'sk-...',defaultValue:modalMode==='edit'&&sel?sel.apiKey:''}),true),
    formRow('模型',C('div',{style:{display:'flex',gap:8}},
      C(Select,{style:{flex:1},placeholder:'选择模型或手动输入',showSearch:true,allowClear:true,defaultValue:modalMode==='edit'&&sel?sel.model:undefined,options:[{value:'gpt-4o',label:'gpt-4o'},{value:'gpt-4o-mini',label:'gpt-4o-mini'},{value:'gpt-4-turbo',label:'gpt-4-turbo'},{value:'claude-sonnet-4-20250514',label:'claude-sonnet-4'},{value:'claude-3-5-haiku-20241022',label:'claude-3-5-haiku'}]}),
      C(Button,{icon:C(SyncOutlined)},'拉取模型'))),
    formRow('上下文大小',C(InputNumber,{style:{width:'100%'},defaultValue:modalMode==='edit'&&sel?sel.ctx:128000,min:1,formatter:function(v){return v>=1000?(v/1000)+'K':v;},parser:function(v){return parseInt((v||'').replace(/K?\s*$/,''))*(v&&v.indexOf('K')>=0?1000:1);}})),
    C('div',{style:{marginBottom:16}},
      C('div',{style:{fontSize:13,fontWeight:500,color:'var(--text-secondary)',marginBottom:6}},'温度 (Temperature)'),
      C('div',{style:{display:'flex',alignItems:'center',gap:12}},
        C('div',{style:{flex:1}},C(Slider,{min:0,max:2,step:0.1,defaultValue:modalMode==='edit'&&sel?sel.temp:0.7})),
        C(InputNumber,{size:'small',min:0,max:2,step:0.1,defaultValue:modalMode==='edit'&&sel?sel.temp:0.7,style:{width:70}}))),
    testSt==='error'?C(Alert,{type:'error',showIcon:true,message:'连接测试失败',description:testMsg,style:{marginTop:8},closable:false}):null
  );
  var formModal=C(Modal,{title:modalMode==='create'?'新建 AI 配置':'编辑 '+sel.name,open:modalOpen,onCancel:function(){setModalOpen(false);setTestSt('idle');setTestMsg('');},width:560,destroyOnClose:true,footer:modalFooter},modalBody);

  if(active==='prompt-lib'){
    return C('div',{className:'page'},ab,C('div',{className:'ct'},C('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',height:'100%',color:'var(--ink-tertiary)',fontSize:13}},'提示词库三栏布局（见 prompt-library-redesign mockup）')));
  }
  return C('div',{className:'page'},ab,cfgList,C('div',{className:'ct'},header,detail),formModal);
}

ReactDOM.createRoot(document.getElementById('root')).render(C(App));
</script>
</body>
</html>
